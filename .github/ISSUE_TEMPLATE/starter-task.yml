name: Starter task proposal
description: Suggest a concrete newcomer-friendly spec or schema task.
title: "[starter] "
labels:
  - good first issue
body:
  - type: textarea
    id: task
    attributes:
      label: Task
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Why it matters
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Suggested files
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true
